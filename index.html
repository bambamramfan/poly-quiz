t.", "S": 3.5, "Y": 3.5, "Z": 3.5, "wS": 0.75, "wY": 0.75, "wZ": 0.75}, {"t": "That I'd be good at it. I think it's bad for everyone and I want all of it anyway.", "S": 0.0, "Y": 3.5, "Z": 3.5, "wS": 1.0, "wY": 0.75, "wZ": 0.75}, {"t": "That everyone fixates on the sex. The real thing is loving many people deeply — friends included — and that part I'd defend to anyone.", "S": 2.5, "Y": 0.5, "Z": 3.0, "wS": 0.75, "wY": 0.75, "wZ": 0.5}, {"t": "The drama. There is always drama.", "S": 2.0, "Y": 2.0, "Z": 2.0, "wS": 0.0, "wY": 0.0, "wZ": 0.0}, {"t": "Having to ask people out again. High school, but with a mortgage.", "S": 2.0, "Y": 2.0, "Z": 2.0, "wS": 0.0, "wY": 0.0, "wZ": 0.0}, {"t": "Fear of rejection, now with more opportunities for it.", "S": 2.0, "Y": 2.0, "Z": 2.0, "wS": 0.0, "wY": 0.0, "wZ": 0.0}, {"t": "Dealing with my partners' partners.", "S": 2.0, "Y": 2.0, "Z": 2.0, "wS": 0.0, "wY": 0.0, "wZ": 0.0}, {"t": "Feeling left out of every institution built for two.", "S": 2.0, "Y": 2.0, "Z": 2.0, "wS": 0.0, "wY": 0.0, "wZ": 0.0}, {"t": "The secrecy. Forever editing who's allowed to know what.", "S": 2.0, "Y": 2.0, "Z": 2.0, "wS": 0.0, "wY": 0.0, "wZ": 0.0}]}, {"title": "You find out your grandparents had an unconventional arrangement.", "opts": [{"t": "I don't want to know.", "S": 0.0, "Y": 2.0, "Z": 2.0, "wS": 1.0, "wY": 0.0, "wZ": 0.0}, {"t": "I'm fascinated but not surprised. Every generation has its secrets.", "S": 1.5, "Y": 2.0, "Z": 2.0, "wS": 0.75, "wY": 0.0, "wZ": 0.0}, {"t": "I respect it more knowing they figured this out without a vocabulary for it.", "S": 2.5, "Y": 2.0, "Z": 2.0, "wS": 0.75, "wY": 0.0, "wZ": 0.0}, {"t": "It makes me feel less alone.", "S": 2.5, "Y": 2.5, "Z": 2.5, "wS": 0.75, "wY": 0.25, "wZ": 0.25}, {"t": "Of course they did. Monogamy has always been aspirational, not descriptive.", "S": 3.5, "Y": 2.0, "Z": 2.0, "wS": 0.75, "wY": 0.0, "wZ": 0.0}]}, {"title": "How much of your love life do your friends know about?", "opts": [{"t": "Everything. Transparency is a value.", "S": 3.0, "Y": 2.5, "Z": 2.5, "wS": 0.5, "wY": 0.25, "wZ": 0.25}, {"t": "The broad strokes. I'm not secretive but I don't perform it.", "S": 2.0, "Y": 2.0, "Z": 2.0, "wS": 0.5, "wY": 0.0, "wZ": 0.0}, {"t": "Very little. My private life is private.", "S": 1.5, "Y": 2.0, "Z": 2.0, "wS": 0.75, "wY": 0.0, "wZ": 0.0}, {"t": "They know about my partner. That's it. That's all there is.", "S": 1.0, "Y": 0.5, "Z": 0.5, "wS": 0.5, "wY": 0.75, "wZ": 0.75}, {"t": "More than my partner does.", "S": 1.0, "Y": 2.5, "Z": 1.5, "wS": 0.5, "wY": 0.75, "wZ": 0.75}]}, {"title": "\"Emotional affairs are just as bad as physical ones.\"", "opts": [{"t": "Worse, actually. The body is just a body. The heart is the real betrayal.", "S": 2.0, "Y": 2.0, "Z": 0.0, "wS": 0.0, "wY": 0.0, "wZ": 1.0}, {"t": "They're different, not ranked. Both can hurt.", "S": 1.0, "Y": 2.0, "Z": 1.0, "wS": 0.5, "wY": 0.0, "wZ": 0.5}, {"t": "The concept of \"emotional affair\" pathologizes normal human connection.", "S": 3.0, "Y": 2.0, "Z": 3.5, "wS": 0.5, "wY": 0.0, "wZ": 0.75}, {"t": "I don't believe in the category. Deep friendships aren't affairs.", "S": 2.5, "Y": 2.0, "Z": 3.0, "wS": 0.75, "wY": 0.0, "wZ": 0.5}, {"t": "Both are only \"bad\" if there's deception.", "S": 3.0, "Y": 2.5, "Z": 2.5, "wS": 0.5, "wY": 0.25, "wZ": 0.25}]}, {"title": "Your relationship to commitment:", "opts": [{"t": "I commit fully and expect the same. One person, all in.", "S": 2.0, "Y": 0.0, "Z": 0.0, "wS": 0.0, "wY": 1.0, "wZ": 1.0}, {"t": "I commit deeply but I don't think commitment means exclusivity.", "S": 3.0, "Y": 2.0, "Z": 3.0, "wS": 0.5, "wY": 0.5, "wZ": 0.5}, {"t": "I commit to honesty, not to restriction.", "S": 3.0, "Y": 3.0, "Z": 2.5, "wS": 1.0, "wY": 0.5, "wZ": 0.25}, {"t": "I struggle with commitment and I'm working on it.", "S": 1.5, "Y": 2.0, "Z": 1.5, "wS": 0.75, "wY": 0.5, "wZ": 0.75}, {"t": "I'm committed to several people right now. It's the most committed I've ever been.", "S": 3.5, "Y": 4.0, "Z": 4.0, "wS": 0.75, "wY": 0.875, "wZ": 0.875}, {"t": "I believe in commitment — and I also sleep around and don’t let it touch my heart. The two aren’t related for me.", "S": 0.5, "Y": 3.5, "Z": 0.5, "wS": 0.75, "wY": 0.75, "wZ": 0.75}]}, {"title": "A friend asks: \"Aren't you worried your partner will leave you for someone else?\"", "opts": [{"t": "Yes, and that's why boundaries exist.", "S": 0.0, "Y": 2.0, "Z": 2.0, "wS": 1.0, "wY": 0.0, "wZ": 0.0}, {"t": "If they did, they weren't mine to keep.", "S": 2.5, "Y": 2.0, "Z": 2.0, "wS": 0.75, "wY": 0.0, "wZ": 0.0}, {"t": "The question doesn't apply. They're not \"leaving\" — they're expanding.", "S": 3.5, "Y": 2.0, "Z": 3.5, "wS": 0.75, "wY": 0.0, "wZ": 0.75}, {"t": "I worry sometimes. I don't think worrying is a reason to restrict someone.", "S": 2.0, "Y": 2.0, "Z": 2.0, "wS": 1.0, "wY": 0.0, "wZ": 0.5}, {"t": "No. What we have can't be replaced. But it can be supplemented.", "S": 3.0, "Y": 2.5, "Z": 2.5, "wS": 0.5, "wY": 0.25, "wZ": 0.25}, {"t": "They’re free to do whatever they want — I think that openness is healthy — but I only have one love in me, and it’s them.", "S": 3.0, "Y": 1.0, "Z": 0.5, "wS": 0.5, "wY": 0.5, "wZ": 0.75}]}, {"title": "\"Sex without emotional connection is...\"", "opts": [{"t": "Fine. Fun, even. Bodies are good at this.", "S": 2.0, "Y": 3.0, "Z": 1.0, "wS": 0.5, "wY": 1.0, "wZ": 0.5}, {"t": "Empty, but I'm not judging anyone who enjoys it.", "S": 1.5, "Y": 0.5, "Z": 2.5, "wS": 0.75, "wY": 0.75, "wZ": 0.25}, {"t": "Not for me, but I understand the appeal.", "S": 1.5, "Y": 0.5, "Z": 2.0, "wS": 0.75, "wY": 0.75, "wZ": 0.0}, {"t": "The freedom to have it without guilt is important, even if I rarely want it.", "S": 3.0, "Y": 2.0, "Z": 2.0, "wS": 0.5, "wY": 0.5, "wZ": 0.0}, {"t": "Impossible. I can't separate the two.", "S": 1.5, "Y": 1.5, "Z": 2.5, "wS": 0.25, "wY": 0.25, "wZ": 0.25}, {"t": "Healthy, honestly — and society would be better if we were relaxed about it. I'll share a bed with anyone; my heart stays with one person.", "S": 3.5, "Y": 3.5, "Z": 0.5, "wS": 0.75, "wY": 0.75, "wZ": 0.75}]}, {"title": "If you could design a society from scratch, relationships would be:", "opts": [{"t": "One man, one woman, one lifetime. It's a foundation, not a cage.", "S": 0.0, "Y": 0.5, "Z": 2.0, "wS": 1.0, "wY": 0.75, "wZ": 0.0}, {"t": "Default monogamous with room for exceptions.", "S": 1.0, "Y": 1.0, "Z": 1.0, "wS": 1.0, "wY": 0.5, "wZ": 0.5}, {"t": "No default. People figure it out for themselves.", "S": 2.5, "Y": 2.0, "Z": 2.0, "wS": 0.75, "wY": 0.0, "wZ": 0.0}, {"t": "Community-oriented. Less emphasis on The Couple as the unit of everything.", "S": 3.0, "Y": 2.0, "Z": 3.0, "wS": 1.0, "wY": 0.0, "wZ": 0.5}, {"t": "Radically free. No ownership, no scripts, no \"defaults.\"", "S": 4.0, "Y": 3.5, "Z": 3.5, "wS": 1.0, "wY": 0.75, "wZ": 0.75}, {"t": "One man, one woman, one lifetime — and I’d break it within a week. The rule should exist precisely because people like me can’t keep it.", "S": 0.5, "Y": 3.5, "Z": 3.5, "wS": 0.75, "wY": 0.75, "wZ": 0.75}, {"t": "Bonds of deep love, many of them, lifelong — and no one allowed to own anyone. The sex is beside the point; the ownership is the crime.", "S": 3.5, "Y": 0.5, "Z": 3.5, "wS": 0.75, "wY": 0.75, "wZ": 0.75}]}, {"title": "When you fantasize, it's usually about:", "opts": [{"t": "My partner.", "S": 2.0, "Y": 0.0, "Z": 0.5, "wS": 0.0, "wY": 1.0, "wZ": 0.75}, {"t": "Someone specific I know. I don't act on it.", "S": 2.0, "Y": 1.5, "Z": 1.5, "wS": 0.0, "wY": 0.75, "wZ": 0.75}, {"t": "Variety. Different people, different scenarios.", "S": 2.0, "Y": 3.0, "Z": 0.5, "wS": 0.0, "wY": 1.0, "wZ": 0.75}, {"t": "Emotional intensity. The fantasy is about connection, not just sex.", "S": 2.0, "Y": 1.0, "Z": 3.0, "wS": 0.0, "wY": 0.5, "wZ": 0.5}, {"t": "A specific scenario involving multiple people I'm already close to.", "S": 2.0, "Y": 3.5, "Z": 3.5, "wS": 0.0, "wY": 0.75, "wZ": 0.75}]}, {"title": "A couple you admire has been together 40 years. What's their secret?", "opts": [{"t": "Loyalty. They chose each other every day.", "S": 0.5, "Y": 2.0, "Z": 2.0, "wS": 0.75, "wY": 0.0, "wZ": 0.0}, {"t": "They gave each other space. Not everything was shared.", "S": 1.5, "Y": 2.0, "Z": 2.0, "wS": 0.75, "wY": 0.0, "wZ": 0.0}, {"t": "They were honest about what they needed, even when it was uncomfortable.", "S": 2.5, "Y": 2.0, "Z": 2.0, "wS": 0.75, "wY": 0.0, "wZ": 0.0}, {"t": "They probably had an arrangement nobody talked about.", "S": 2.0, "Y": 2.5, "Z": 2.0, "wS": 0.5, "wY": 0.25, "wZ": 0.0}, {"t": "Forty years with the same person sounds like an endurance test, not a goal.", "S": 3.0, "Y": 3.0, "Z": 2.5, "wS": 0.5, "wY": 0.5, "wZ": 0.25}]}, {"title": "You realize you have deep feelings for a close friend. You are in a relationship.", "opts": [{"t": "I pull back from the friendship. Boundaries.", "S": 2.0, "Y": 2.0, "Z": 0.0, "wS": 0.0, "wY": 0.0, "wZ": 1.0}, {"t": "I sit with it privately. It'll pass.", "S": 1.0, "Y": 2.0, "Z": 1.0, "wS": 0.5, "wY": 0.0, "wZ": 0.5}, {"t": "I tell my partner. We figure it out together.", "S": 2.0, "Y": 2.0, "Z": 2.5, "wS": 1.0, "wY": 0.0, "wZ": 0.75}, {"t": "I tell my friend. Life is short.", "S": 2.5, "Y": 2.0, "Z": 3.0, "wS": 0.75, "wY": 0.0, "wZ": 1.0}, {"t": "This is just what life is like for me. It doesn't threaten anything.", "S": 3.5, "Y": 2.0, "Z": 4.0, "wS": 0.75, "wY": 0.0, "wZ": 0.875}]}, {"title": "Religion and monogamy:", "opts": [{"t": "Marriage is sacred. God designed it for two people.", "S": 0.0, "Y": 0.5, "Z": 2.0, "wS": 1.0, "wY": 0.75, "wZ": 0.0}, {"t": "My faith informs my values but I don't impose them.", "S": 1.0, "Y": 1.0, "Z": 1.0, "wS": 1.0, "wY": 0.5, "wZ": 0.5}, {"t": "I don't think about religion when I think about sex.", "S": 2.0, "Y": 2.5, "Z": 2.0, "wS": 0.5, "wY": 0.25, "wZ": 0.0}, {"t": "Religion has been used to control sexuality for centuries. I'm suspicious of the whole frame.", "S": 3.0, "Y": 2.5, "Z": 2.0, "wS": 1.0, "wY": 0.25, "wZ": 0.0}, {"t": "My spirituality is actually deepened by loving more than one person.", "S": 3.5, "Y": 2.0, "Z": 3.5, "wS": 0.5, "wY": 0.0, "wZ": 0.75}]}, {"title": "How do you feel right now, taking this quiz?", "opts": [{"t": "Defensive. These questions assume polyamory is valid and I'm not sure it is.", "S": 0.0, "Y": 0.5, "Z": 2.0, "wS": 1.0, "wY": 0.75, "wZ": 0.0}, {"t": "Curious. I'm learning something about myself.", "S": 1.5, "Y": 1.5, "Z": 1.5, "wS": 0.75, "wY": 0.75, "wZ": 0.75}, {"t": "Seen. Nobody usually asks these questions this directly.", "S": 2.5, "Y": 2.5, "Z": 2.5, "wS": 0.75, "wY": 0.25, "wZ": 0.25}, {"t": "Amused. I know exactly where I'm landing.", "S": 2.0, "Y": 2.0, "Z": 2.0, "wS": 0.5, "wY": 0.0, "wZ": 0.0}, {"t": "I sent this to three partners and we're comparing results.", "S": 3.5, "Y": 3.5, "Z": 3.5, "wS": 0.75, "wY": 0.75, "wZ": 0.75}]}, {"title": "Ten years from now, you hope your love life looks like:", "opts": [{"t": "What it looks like now, but deeper. One person, built over time.", "S": 1.0, "Y": 0.0, "Z": 0.0, "wS": 0.5, "wY": 1.0, "wZ": 1.0}, {"t": "Mostly the same, but with more flexibility than I have now.", "S": 1.5, "Y": 1.5, "Z": 1.5, "wS": 0.75, "wY": 0.75, "wZ": 0.75}, {"t": "A small constellation. A few people who matter deeply.", "S": 2.5, "Y": 1.5, "Z": 3.0, "wS": 0.75, "wY": 0.75, "wZ": 1.0}, {"t": "A full life with multiple partners, openly and without apology.", "S": 3.5, "Y": 4.0, "Z": 4.0, "wS": 0.75, "wY": 0.875, "wZ": 0.875}, {"t": "I genuinely don't know. I want to stay open to whatever comes.", "S": 2.0, "Y": 2.0, "Z": 2.0, "wS": 0.5, "wY": 0.5, "wZ": 0.5}]}, {"title": "A friend invites you to a play party. Multiple people, in the open, everyone consenting.", "opts": [{"t": "Absolutely not. That's not something I could ever want.", "S": 1.5, "Y": 0.0, "Z": 2.0, "wS": 0.25, "wY": 1.0, "wZ": 0.0}, {"t": "Not for me, but I'm glad it exists for people who want it.", "S": 2.5, "Y": 0.5, "Z": 2.0, "wS": 0.25, "wY": 0.75, "wZ": 0.0}, {"t": "I'm curious. I'd want to go and watch, at least.", "S": 2.5, "Y": 2.0, "Z": 2.0, "wS": 0.75, "wY": 1.0, "wZ": 0.0}, {"t": "Yes. The group energy is the whole appeal — it's not about any one person.", "S": 2.5, "Y": 3.5, "Z": 1.0, "wS": 0.75, "wY": 0.75, "wZ": 0.5}, {"t": "A friend invites *me*? I'm usually the one throwing it.", "S": 3.0, "Y": 4.0, "Z": 2.5, "wS": 1.0, "wY": 1.0, "wZ": 0.25}]}, {"title": "Someone you're not attracted to propositions you. Your response?", "opts": [{"t": "\"I'm monogamous and I have a partner.\" (true)", "S": 1.0, "Y": 0.5, "Z": 2.0, "wS": 0.5, "wY": 0.75, "wZ": 0.0}, {"t": "\"I'm monogamous and I have a partner.\" (not true — it's just the easiest exit)", "S": 1.5, "Y": 1.5, "Z": 2.0, "wS": 0.25, "wY": 0.25, "wZ": 0.0}, {"t": "\"Sure, I'm bored.\"", "S": 2.5, "Y": 4.0, "Z": 1.0, "wS": 0.75, "wY": 1.0, "wZ": 0.5}, {"t": "\"Not interested, but thank you.\" (polite, no excuse needed)", "S": 2.0, "Y": 1.5, "Z": 2.0, "wS": 0.5, "wY": 0.75, "wZ": 0.0}, {"t": "\"Not the sex — but do you want to get a drink / play a game / actually talk?\"", "S": 2.5, "Y": 1.0, "Z": 3.0, "wS": 0.75, "wY": 0.5, "wZ": 1.0}, {"t": "Scandalized. Slap in the face.", "S": 0.0, "Y": 0.0, "Z": 2.0, "wS": 1.0, "wY": 1.0, "wZ": 0.0}]}, {"title": "Your kid, age 24, brings home not one partner but two, and explains the three of them are together.", "opts": [{"t": "I'm thrilled. This is a real relationship and I'll set three places at the table.", "S": 3.5, "Y": 2.0, "Z": 3.0, "wS": 0.75, "wY": 0.0, "wZ": 0.5}, {"t": "Happy for them — though I could never keep that many people straight myself.", "S": 3.0, "Y": 0.5, "Z": 1.0, "wS": 0.5, "wY": 0.75, "wZ": 0.5}, {"t": "I'll be polite, but I think they're making their life harder than it needs to be.", "S": 1.0, "Y": 1.5, "Z": 1.5, "wS": 0.5, "wY": 0.25, "wZ": 0.25}, {"t": "I don't approve — but God help me, I remember being young and I understand the pull.", "S": 0.5, "Y": 2.5, "Z": 3.0, "wS": 0.75, "wY": 0.25, "wZ": 0.5}, {"t": "This is exactly what I was afraid the world was coming to.", "S": 0.0, "Y": 1.0, "Z": 1.0, "wS": 1.0, "wY": 0.25, "wZ": 0.25}, {"t": "I'm horrified for them — precisely because I'd have done the same thing at their age, and I know how unhappy it made me in the long run.", "S": 0.5, "Y": 3.0, "Z": 3.5, "wS": 0.75, "wY": 0.5, "wZ": 0.75}]}, {"title": "Your church (or the tradition you were raised in) marries one person to one person, full stop.", "opts": [{"t": "That's right and good. It's one of the things they get correct.", "S": 0.0, "Y": 0.5, "Z": 0.5, "wS": 1.0, "wY": 0.75, "wZ": 0.75}, {"t": "Good for society, broadly — but I don't have to do everything my church says.", "S": 2.5, "Y": 2.0, "Z": 2.0, "wS": 0.75, "wY": 0.0, "wZ": 0.0}, {"t": "That rule is exactly why I left.", "S": 3.5, "Y": 2.0, "Z": 2.0, "wS": 0.75, "wY": 0.0, "wZ": 0.0}, {"t": "I respect the institution and quietly ignore that part of it.", "S": 1.5, "Y": 2.0, "Z": 2.0, "wS": 0.75, "wY": 0.5, "wZ": 0.5}, {"t": "I'm in a sex-positive commune now, so — we've diverged.", "S": 3.5, "Y": 3.5, "Z": 3.0, "wS": 0.75, "wY": 0.75, "wZ": 0.5}]}, {"title": "What's behind the \"male loneliness epidemic\"?", "opts": [{"t": "Men were sold a model of life — one wife, provide and protect — and the economy stopped delivering the jobs that made it possible.", "S": 1.0, "Y": 1.0, "Z": 1.0, "wS": 0.5, "wY": 0.25, "wZ": 0.25}, {"t": "Dating apps concentrated attention on a few men and left everyone else with nothing. The market broke.", "S": 1.5, "Y": 2.0, "Z": 1.5, "wS": 0.25, "wY": 0.0, "wZ": 0.25}, {"t": "People need more kinds of love than one romantic partner — friendship, community, touch. We built a society that offers only the one, then removed it.", "S": 3.5, "Y": 1.5, "Z": 3.0, "wS": 0.75, "wY": 0.25, "wZ": 0.5}, {"t": "Honestly? A lot of men never learned to be the kind of person anyone wants around.", "S": 1.0, "Y": 1.0, "Z": 1.0, "wS": 0.5, "wY": 0.25, "wZ": 0.25}, {"t": "The whole \"one person should be your everything\" expectation is the disease, not the cure. Spread the load.", "S": 4.0, "Y": 2.0, "Z": 2.5, "wS": 1.0, "wY": 0.0, "wZ": 0.25}, {"t": "We stopped honoring friendship. Deep, lifelong friends used to be a person’s center of gravity — that bond matters more than sex and we’ve let it wither.", "S": 3.0, "Y": 1.0, "Z": 3.5, "wS": 0.5, "wY": 0.5, "wZ": 0.75}]}, {"title": "Your most honest reason for being interested in (or wary of) polyamory:", "opts": [{"t": "I think it would make the whole society healthier and less dishonest.", "S": 3.5, "Y": 2.0, "Z": 2.0, "wS": 0.75, "wY": 0.0, "wZ": 0.0}, {"t": "I personally fall in love with too many people to pretend otherwise.", "S": 2.0, "Y": 1.5, "Z": 4.0, "wS": 0.0, "wY": 0.25, "wZ": 1.0}, {"t": "I personally want more than one lover, and that's the whole of it.", "S": 2.0, "Y": 4.0, "Z": 1.5, "wS": 0.0, "wY": 1.0, "wZ": 0.25}, {"t": "I think it's corrosive and I'd steer society away from it.", "S": 0.0, "Y": 1.0, "Z": 1.0, "wS": 1.0, "wY": 0.25, "wZ": 0.25}, {"t": "I want one person and I want the world to keep making that easy.", "S": 0.5, "Y": 0.5, "Z": 0.5, "wS": 0.75, "wY": 0.75, "wZ": 0.75}]}, {"title": "A poly activist and a happily monogamous person are arguing. Whose side are you on?", "opts": [{"t": "The activist's, on principle — even though I'm monogamous myself.", "S": 3.5, "Y": 1.0, "Z": 1.0, "wS": 0.75, "wY": 0.5, "wZ": 0.5}, {"t": "The activist's, and I'm one of them.", "S": 3.5, "Y": 3.0, "Z": 3.0, "wS": 0.75, "wY": 0.5, "wZ": 0.5}, {"t": "The monogamous person's, on principle — though my own heart is messier than theirs.", "S": 0.5, "Y": 2.0, "Z": 3.0, "wS": 0.75, "wY": 0.0, "wZ": 0.5}, {"t": "The monogamous person's, and I am one.", "S": 0.5, "Y": 0.5, "Z": 0.5, "wS": 0.75, "wY": 0.75, "wZ": 0.75}, {"t": "Neither. It's not a debate that should have sides.", "S": 2.5, "Y": 2.0, "Z": 2.0, "wS": 0.75, "wY": 0.0, "wZ": 0.0}]}, {"title": "Have you ever slept with a near-stranger?", "opts": [{"t": "Yes, more than once. It's fine if you're sensible.", "S": 2.5, "Y": 3.5, "Z": 1.0, "wS": 0.75, "wY": 0.75, "wZ": 0.5}, {"t": "Once or twice. I don't regret it but I wouldn't make a habit of it.", "S": 2.0, "Y": 2.5, "Z": 1.5, "wS": 0.5, "wY": 0.75, "wZ": 0.25}, {"t": "I've wanted to — but the risk always stopped me.", "S": 0.5, "Y": 3.0, "Z": 1.5, "wS": 0.75, "wY": 0.5, "wZ": 0.25}, {"t": "No, and not because of risk — it's just not something I want.", "S": 2.0, "Y": 0.5, "Z": 1.0, "wS": 0.0, "wY": 0.75, "wZ": 0.5}, {"t": "No. That's exactly the kind of thing that ruins lives.", "S": 0.0, "Y": 0.5, "Z": 1.0, "wS": 1.0, "wY": 0.75, "wZ": 0.25}]}, {"title": "A friend in an open relationship just got an STD scare. Your reaction?", "opts": [{"t": "That's the math catching up. More partners, more exposure — it's not complicated.", "S": 0.5, "Y": 1.5, "Z": 1.5, "wS": 0.75, "wY": 0.25, "wZ": 0.25}, {"t": "Scary, but it happens to monogamous people too. Bad luck, not a verdict.", "S": 2.5, "Y": 2.0, "Z": 2.0, "wS": 0.75, "wY": 0.0, "wZ": 0.0}, {"t": "Honestly it's one of the big reasons I keep my own life smaller than I want to.", "S": 0.5, "Y": 3.0, "Z": 2.5, "wS": 0.75, "wY": 0.5, "wZ": 0.25}, {"t": "I'd help them through it and not think twice about the lifestyle.", "S": 3.0, "Y": 2.5, "Z": 2.5, "wS": 0.5, "wY": 0.25, "wZ": 0.25}, {"t": "This is why testing and honesty are the whole game. Manageable.", "S": 3.0, "Y": 2.5, "Z": 2.0, "wS": 1.0, "wY": 0.25, "wZ": 0.0}]}, {"title": "The thing that actually scares you about opening up a relationship:", "opts": [{"t": "Catching feelings I can't control and blowing up my whole life.", "S": 1.0, "Y": 1.5, "Z": 3.5, "wS": 0.5, "wY": 0.25, "wZ": 0.75}, {"t": "The drama. The processing. The 2am conversations. Exhausting.", "S": 1.5, "Y": 2.0, "Z": 1.5, "wS": 0.25, "wY": 0.0, "wZ": 0.25}, {"t": "Genuinely the physical risk — disease, or a stranger who turns out dangerous.", "S": 0.5, "Y": 2.5, "Z": 2.0, "wS": 0.75, "wY": 0.25, "wZ": 0.0}, {"t": "Nothing scares me about it. I've made my peace with the tradeoffs.", "S": 3.0, "Y": 2.5, "Z": 2.5, "wS": 0.5, "wY": 0.25, "wZ": 0.25}, {"t": "That it would end the one good thing I have.", "S": 1.0, "Y": 1.0, "Z": 1.5, "wS": 0.5, "wY": 0.25, "wZ": 0.25}]}, {"title": "Think about your worst breakup. What was it?", "opts": [{"t": "The worst thing that's ever happened to me. I'm not sure I'd survive another.", "S": 1.0, "Y": 1.0, "Z": 3.5, "wS": 0.5, "wY": 0.25, "wZ": 0.75}, {"t": "Painful, clean, over. One person, one ending.", "S": 1.0, "Y": 1.0, "Z": 1.0, "wS": 0.5, "wY": 0.5, "wZ": 0.5}, {"t": "It took out half my friend group. The fallout went everywhere.", "S": 1.0, "Y": 2.5, "Z": 3.0, "wS": 0.5, "wY": 0.25, "wZ": 0.5}, {"t": "The fear of one going nuclear is exactly why I keep things simpler than I'd like.", "S": 0.5, "Y": 2.5, "Z": 2.5, "wS": 0.75, "wY": 0.25, "wZ": 0.25}, {"t": "Honestly fine. I don't fuse with people that way, so endings don't wreck me.", "S": 2.0, "Y": 2.0, "Z": 0.5, "wS": 0.0, "wY": 0.0, "wZ": 0.75}]}], "icov": [[2.71561, -1.11678, -0.86195], [-1.11678, 2.30017, -0.44978], [-0.86195, -0.44978, 1.92912]], "archetypes": [{"name": "The Cathedral", "desc": "Fully monogamous on all axes, thinks society should be too. One person, forever, and that's the point. Has a wedding Pinterest board from before they were dating anyone.", "saint": "Mike Pence. One marriage, one woman, won't dine alone with another. The structure is the point.", "S": 0, "Y": 0, "Z": 0, "seed": [0.2865, 0.3655, 0.3271], "w": -0.1543}, {"name": "The Commune", "desc": "Maximum everything. Love is abundant, sex is abundant, monogamy is a cage. Owns a copy of *The Ethical Slut* that's been lent out so many times they've lost track.", "saint": "The Marstons (William Moulton Marston, Elizabeth Holloway Marston, & Olive Byrne). Created Wonder Woman out of their polycule. Elizabeth and Olive lived together for 43 years after William died. The lasso of truth was autobiography.", "S": 4, "Y": 4, "Z": 4, "seed": [3.256, 3.3321, 3.2897], "w": -0.9442}, {"name": "The Senator", "desc": "Publicly champions traditional family values. Privately... doesn't. No emotional attachment to the extracurriculars, which is how they sleep at night.", "saint": "Gary Hart. Frontrunner for the 1988 Democratic nomination, told the press \"follow me around, I dare you,\" was photographed with Donna Rice on a yacht called Monkey Business within the week. Told the press to follow him. They did.", "S": 0, "Y": 4, "Z": 0, "seed": [0.9315, 2.5025, 0.893], "w": 0.3527}, {"name": "The Romantic Anarchist", "desc": "Wants deep emotional bonds with many people, doesn't need sex to be part of it, thinks the whole institution of monogamy is broken. Writes long posts about relationship anarchy. Has never had a one-night stand in their life.", "saint": "Simone de Beauvoir. Deep emotional bonds with many people, rejected marriage as bourgeois, and wrote the philosophical framework for all of it. The sexual relationships existed but the emotional architecture was always the point.", "S": 4, "Y": 0, "Z": 4, "seed": [2.9419, 1.1919, 3.1631], "w": 0.7784}, {"name": "The Libertine", "desc": "Sleeps with everyone, bonds with no one, doesn't think it's society's business either way. Historically this person was French.", "saint": "Casanova. The historical one. Slept with everyone, bonded with no one, wrote a memoir about it. Not ideological, just Italian.", "S": 2, "Y": 4, "Z": 0, "seed": [2.0564, 2.9776, 0.7794], "w": 0.7364}, {"name": "The Nun", "desc": "Fully monogamous sexually, falls in love with everyone, thinks this is a problem. Has three \"platonic soulmates.\" Your normie friends have a group text trying to figure out what's going on.", "saint": "Emily Dickinson. Sexually cloistered. Emotionally devoted to several people she mostly communicated with through letters and a closed door.", "S": 0, "Y": 0, "Z": 4, "seed": [0.6431, 0.6765, 2.8959], "w": 1.4012}, {"name": "The Dog Park", "desc": "Boundless emotional connection, no sexual interest in spreading it around, thinks this way of being is genuinely better. Loves everyone at the party. Goes home with the person they came with.", "saint": "Mr. Rogers. Boundless emotional connection with every human being he encountered. Zero sexual energy. Thought the world would be better if everyone loved each other more openly. Went home to Joanne every night.", "S": 3, "Y": 0, "Z": 4, "seed": [2.6161, 0.9424, 3.2045], "w": 1.0493}, {"name": "The Burning Man", "desc": "Sex is free, feelings are not, monogamy is oppression. Has strong opinions about \"compulsory monogamy\" but ghosts after the third date.", "saint": "Sartre. Sex is free, feelings are strategic, monogamy is bad faith. Had a \"transparency pact\" with de Beauvoir that was mostly transparent about the sex. His contingent lovers found out where they ranked when the letters were published posthumously.", "S": 4, "Y": 4, "Z": 0, "seed": [2.9581, 3.0148, 1.0886], "w": 0.9916}, {"name": "The Escalator", "desc": "Monogamish. Curious, flexible, mostly traditional but not rigid. Would consider a threesome on vacation. Hasn't had one.", "saint": "Esther Perel. Explores the edges in theory and in her therapy practice. Thinks the discourse is more interesting than the lifestyle. Has been married to one man the whole time.", "S": 1, "Y": 1, "Z": 1, "seed": [1.007, 0.9001, 1.0504], "w": -0.7789}, {"name": "The Hinge", "desc": "Has a primary partner and some things on the side, both sexual and emotional. It's working but the Google Calendar is getting complicated. Thinks it's nobody's business.", "saint": "Anaïs Nin. Had a husband (Hugo), a famous lover (Henry Miller), and several others, all with genuine emotional and sexual involvement. Kept parallel diaries. The Google Calendar was a journal and it was incredibly complicated.", "S": 2, "Y": 2, "Z": 2, "seed": [2.0382, 1.9363, 1.9476], "w": -0.7306}, {"name": "The Polycule", "desc": "Multiple partners, no hierarchy, real emotional investment in all of them, thinks this is how humans are meant to live. Spends a lot of time processing.", "saint": "Dossie Easton (co-author, The Ethical Slut). Multiple partners, no hierarchy, real emotional investment, literally wrote the manual. Spends a lot of time processing because she invented the concept of processing.", "S": 3, "Y": 3, "Z": 3, "seed": [2.9199, 2.8537, 2.9911], "w": -1.1431}, {"name": "The Golden Retriever", "desc": "Loves everyone, sleeps with everyone, thinks it's beautiful. Genuinely has the emotional bandwidth. You don't believe them but they're not lying.", "saint": "Stephen Fry. Boundless, articulate affection for seemingly everyone he meets; the warmth reads as wholly genuine. Loves widely and openly and thinks the world would be better for more of it. You don't quite believe the bandwidth is real, but it is.", "S": 3, "Y": 4, "Z": 4, "seed": [3.1222, 3.3066, 3.2791], "w": -0.9576}, {"name": "The Situationship", "desc": "Sexual openness slightly outpaces emotional openness. Has \"things\" with people. Doesn't define the relationship because defining it would end it.", "saint": "Lord Byron. Sexual openness outpacing emotional availability by a mile. Had \"things\" with people across Europe. Didn't define any of them because defining them would require sitting still.", "S": 2, "Y": 2, "Z": 1, "seed": [1.8779, 1.8871, 1.2588], "w": -0.4357}, {"name": "The U-Haul", "desc": "Emotional openness dramatically outpaces sexual openness. Falls in love fast and hard, doesn't necessarily sleep around. The feelings are consuming, not ambient. Has several exes they're still deeply enmeshed with and a current partner who has made peace with it.", "saint": "Virginia Woolf. Her bond with Vita Sackville-West was volcanic emotionally, tentative sexually, and produced Orlando.", "S": 2, "Y": 1, "Z": 3, "seed": [2.1493, 1.3217, 2.9062], "w": -0.2826}, {"name": "The Corkscrew", "desc": "Wants multiple partners sexually and emotionally, thinks this is bad for society. Knows they're part of the problem. The self-awareness doesn't help.", "saint": "Ben Franklin. Multiple sexual and emotional relationships throughout his life, including common-law arrangements in two countries, while publicly championing moral virtue and temperance. The self-awareness was there. It didn't help.", "S": 0, "Y": 3, "Z": 3, "seed": [0.9071, 2.4186, 2.4332], "w": 0.2108}, {"name": "The Courtly Lover", "desc": "Sexually monogamous, emotionally devoted to people you may never touch. This isn't repression — it's cathedral-building.", "saint": "Dante. Met Beatrice twice. He wrote 31 poems about her, then built the entire Divine Comedy around her. His wife Gemma appeared in none of them.", "S": 0, "Y": 0, "Z": 2, "seed": [0.411, 0.516, 1.084], "w": -0.5175}, {"name": "The Fuckboy (Philosophical)", "desc": "Lots of sex, no feelings, thinks this is healthy and society would benefit from less possessiveness. Has read the theory. Still doesn't text back.", "saint": "Henry Miller. Lots of sex, few sustained feelings, thought this was liberating and wrote a whole literary philosophy around it. Tropic of Cancer is the manifesto. Still doesn't text back.", "S": 3, "Y": 3, "Z": 0, "seed": [2.6726, 2.7489, 0.8544], "w": 0.9063}, {"name": "The Therapist's Retirement Fund", "desc": "Mostly monogamous sexually, falls deeply for many people, vaguely thinks society shouldn't judge. Currently in love with their partner, their coworker, and a barista. Seeing someone about it.", "saint": "Frida Kahlo. Mostly monogamous sexually (a few notable exceptions), fell deeply for many people, thought society shouldn't judge. The paintings are about it.", "S": 1, "Y": 1, "Z": 3, "seed": [1.1354, 0.9828, 2.6497], "w": 0.1342}, {"name": "The Puritan in the Streets", "desc": "Has a main partner and some flings, no emotional attachment to the flings, thinks polyamory is bad for society. He runs on the contradiction.", "saint": "JFK. Main partner plus flings, no emotional attachment to the flings, publicly performed traditional family values. He ran on the contradiction, and the Secret Service ran interference.", "S": 0, "Y": 2, "Z": 0, "seed": [0.5374, 1.4168, 0.568], "w": -0.1211}, {"name": "The Locksmith", "desc": "Fully monogamous in practice, believes monogamy is property-thinking in theory. Hasn't opened the relationship because the theory hasn't met the right moment. Or person. Or nerve.", "saint": "Bertrand Russell. Wrote Marriage and Morals (1929), arguing monogamy was irrational possessiveness. Won the Nobel Prize partly for it. Was serially monogamous in practice for most of his life.", "S": 4, "Y": 0, "Z": 0, "seed": [2.7489, 0.82, 0.5727], "w": 1.9084}, {"name": "The Ambassador", "desc": "Monogamous, thinks polyamory is great — for other people. Shows up to their poly friends' parties, genuinely supportive, goes home to one person and is relieved about it.", "saint": "Dan Savage. Coined \"monogamish,\" advocates loudly for relationship freedom, has been with one man for decades. Shows up to the poly community's parties, genuinely supportive, goes home to Terry.", "S": 3, "Y": 0, "Z": 0, "seed": [2.3795, 0.6471, 0.4881], "w": 1.3365}, {"name": "The Grenade", "desc": "Maximum personal openness, only barely tolerates it ideologically. \"I know this is a mess but a crusade against it would be worse.\" Lives chaotically and knows it.", "saint": "Edna St. Vincent Millay. Maximum personal openness — her candle burned at both ends and in the middle. Lived chaotically and the poems are the proof.", "S": 1, "Y": 4, "Z": 4, "seed": [1.6275, 3.1953, 3.1234], "w": 0.5335}, {"name": "The Couch", "desc": "Barely curious, thinks it's nobody's business. The most common position nobody writes about. Would swipe past this quiz.", "saint": "Michelle Obama. Has projected exactly \"mind your own business\" energy on this topic for two decades. The most dignified version of not having an opinion.", "S": 2, "Y": 1, "Z": 1, "seed": [1.7559, 1.1607, 1.1805], "w": -0.7126}, {"name": "The Brunch", "desc": "Slightly more emotionally open than sexually, moderate on society. The emotion is ambient, not consuming — a close friend group where everyone's a little bit in love with each other, low-grade and permanent, and nobody acts on it or names it.", "saint": "Vita Sackville-West. A close circle where everyone's a little bit in love with each other and they wrote novels about it instead of talking about it.", "S": 2, "Y": 1, "Z": 2, "seed": [1.9059, 1.2246, 1.8367], "w": -0.4712}, {"name": "The Lease", "desc": "Has a main partner and some sexual freedom, less emotional wandering, thinks society is right to be cautious. The arrangement works because nobody writes a revenge album.", "saint": "Mick Jagger. Has had approximately one primary partner per decade and a secondary roster that could fill Wembley. The side things are not a secret and not a crisis. Nobody writes a revenge album because nobody expected otherwise.", "S": 1, "Y": 2, "Z": 1, "seed": [1.237, 1.7213, 1.1944], "w": -0.5802}, {"name": "The Slow Burn", "desc": "Sexually monogamous, emotionally open, thinks it's private. Falls for people over months of conversation. Your friends keep asking if you're sure that's just a friendship. Your partner already knows, because you talk about it constantly.", "saint": "Charles Williams. Married, sexually monogamous, but carried an intense emotional affair with Phyllis Jones for over a decade — wrote her hundreds of poems and built an entire theology (\"romantic theology\") around the idea that love for specific people is how you find God. Invented a branch of theology to describe what was happening to him. It was called co-inherence. It was about Phyllis.", "S": 2, "Y": 0, "Z": 2, "seed": [1.876, 0.8508, 1.8168], "w": -0.2116}, {"name": "The App", "desc": "Sexually open with whoever, no emotional wandering, thinks it' umulator. Was still mostly in serial monogamous relationships.", "S": 4, "Y": 1, "Z": 1, "seed": [2.9772, 1.3069, 1.0296], "w": 1.1567}, {"name": "The Kindergarten Teacher", "desc": "Loves many people deeply, not sexually, thinks the world would be better with more of this.", "saint": "bell hooks. Loved many people deeply, not sexually, thought the world would be better with more of this. Wrote All About Love as the framework. Would object to being in this quiz. And probably you do too.", "S": 3, "Y": 0, "Z": 3, "seed": [2.6207, 0.9464, 3.0075], "w": 0.8844}, {"name": "The Nesting Doll", "desc": "Multiple partners, real feelings for all of them, thinks it's no one's business. The actually-functioning polyamorous person who doesn't evangelize. Has a color-coded shared calendar that works.", "saint": "Carrie Jenkins (philosopher, author of What Love Is). Multiple partners, real feelings for all of them, wrote the philosophical defense without making it a movement. Has a color-coded shared calendar that works.", "S": 2, "Y": 3, "Z": 3, "seed": [2.28, 2.5944, 2.8124], "w": -1.1485}, {"name": "The Moth", "desc": "Fully monogamous sexually, falls for everyone emotionally, thinks society is probably right to be wary. Drawn to every interesting person like a porch light. Your partner finds it adorable. Your mother finds it exhausting.", "saint": "Rumi. Fully monogamous in practice, emotionally devoted to every soul he encountered. Wrote some of the most intense love poetry in any language and meant all of it about God and also about Shams.", "S": 1, "Y": 0, "Z": 4, "seed": [0.9404, 0.7306, 3.0994], "w": 1.5468}, {"name": "The Switchboard", "desc": "Lots of sexual partners, low emotional investment, thinks it's good for society. The connector. Introduces their various partners to each other. Nobody's jealous because nobody's that attached.", "saint": "Charlie Sheen (the \"winning\" era). Lots of partners, low emotional investment, thought it was a lifestyle upgrade and said so on national television. Introduced his various partners to each other on camera.", "S": 3, "Y": 3, "Z": 1, "seed": [2.7201, 2.8873, 1.2556], "w": 0.2857}, {"name": "The Submarine", "desc": "Quietly poly, doesn't talk about it, vaguely uncomfortable with the whole discourse. Has two partners. Both know. Nobody at work knows.", "saint": "Chopin & George Sand. Quietly non-traditional, didn't talk about it, vaguely uncomfortable with the discourse. Had partners. Both knew. Nobody at the salon discussed it directly.", "S": 1, "Y": 2, "Z": 2, "seed": [1.3292, 1.7824, 1.6362], "w": -0.7116}, {"name": "The Honest Rake", "desc": "Sleeps with everyone, catches no feelings, thinks society is right to raise an eyebrow but a moral crusade would be worse. Charmingly upfront about what this is. Nobody's mad, somehow.", "saint": "Warren Beatty (pre-Annette Bening). Slept with everyone in Hollywood, caught no feelings, was charmingly upfront about what this was. Nobody was mad, somehow. Then he met Annette Bening and stopped entirely.", "S": 1, "Y": 4, "Z": 0, "seed": [1.3905, 2.7807, 0.814], "w": 0.6924}, {"name": "The Toothbrush", "desc": "Sexually moderate, emotionally very open, thinks it's private. The test is whether you'd leave a toothbrush at a non-primary partner's house. You would. You have.", "saint": "Janelle Monáe. Sexually moderate, emotionally very open, thinks it's private. Has publicly acknowledged being in both poly and mono relationships. The toothbrush test: would you leave one at a non-primary partner's house? She would. She has.", "S": 2, "Y": 2, "Z": 3, "seed": [2.1873, 1.9335, 2.8769], "w": -0.9972}, {"name": "The Catastrophe", "desc": "Wants everything with everyone, thinks this is terrible. A walking crisis. Changed a state religion to solve a relationship problem. Probably the funniest result to get.", "saint": "Henry VIII. Wanted everything with everyone, thought this was terrible — or at least thought everyone else should think it was terrible. A walking crisis. Changed the state religion to solve a relationship problem.", "S": 0, "Y": 4, "Z": 4, "seed": [1.3164, 3.0117, 2.9683], "w": 0.7266}, {"name": "The Patron Saint of Crushes", "desc": "You fall in love constantly — with friends, strangers, the person who recommended a book to you once. It's rarely about sex; it's about the electric specificity of another human being. You think a world with more of this openly admitted would be warmer and more honest, and you're probably right. Your sexual life is quiet. Your inner life is a crowded, glowing room.", "saint": "Walt Whitman. \"I contain multitudes\" was arithmetic: the number of people he could love at once. Wrote the most expansive love poetry in American English, addressed to soldiers, strangers, ferry passengers, and the reader holding the book. Mostly kept the body out of it. Loved everyone, openly, as a civic project.", "S": 3, "Y": 1, "Z": 4, "seed": [2.7182, 1.3889, 3.2163], "w": 0.1922}, {"name": "The Open Heart", "desc": "Emotionally, you're boundless — you love many people deeply and don't think that takes anything away from anyone. Sexually, you're open but it's not the engine; you've got a primary bond and some flings, but the flings matter less to you than the constellation of people you're genuinely in love with. You think this is a richer, more honest way to live, and you'd recommend it.", "saint": "Audre Lorde. Wrote that the erotic is a source of power and lived a life of profound, plural love — partners, community, a vast web of deep bonds she refused to rank. The emotional connections were the center of gravity; everything else orbited them. \"I am deliberate and afraid of nothing.\"", "S": 3, "Y": 2, "Z": 4, "seed": [2.8467, 2.2138, 3.2093], "w": -1.1}, {"name": "The Aristocrat", "desc": "Many partners, taken as the natural prerogative of status — not a movement, not a confession, simply what someone of your standing does. The feelings stay shallow; the sense of entitlement does not. Sex is a perquisite of rank.", "saint": "Gaston. Has been with half the village and thinks nothing of it; the conquests are trophies, not loves. Wants Belle the way he wants a prize buck on the wall — possessively, publicly, and without a flicker of genuine tenderness.", "S": 2, "Y": 4, "Z": 2, "seed": [2.1988, 3.0915, 2.0945], "w": -0.68}, {"name": "The Sex Worker With a Spreadsheet", "desc": "Maximum sexual openness, real emotional range, and a pro-social conviction that being honest and skilled about all of this makes the world better. You treat desire as data — patterns, surveys, a clear-eyed inventory of what people actually want — and you are not ashamed of any of it.", "saint": "Aella. Loves widely, sleeps widely, surveys all of it, and publishes the numbers. Treats sex and connection as a research program and thinks the candor is the point.", "S": 3, "Y": 4, "Z": 3, "seed": [3.0221, 3.3311, 3.0086], "w": -1.0307}, {"name": "Poor Impulse Control", "desc": "Lots of sex, very little of it connected to anything, and a running awareness that it's a mess. You didn't plan it; you were drunk, it was there, and stopping wasn't in you that night. You're not building a philosophy — you're managing a pattern, badly, and you know it.", "saint": "Jimmy McNulty (The Wire). \"Poor impulse control\" was the canonical description. A high-functioning drinker who falls into bar-bathroom hookups whenever his life destabilizes — driven by chaos and self-sabotage, structurally unable to sustain the intimacy he keeps wrecking.", "S": 1, "Y": 4, "Z": 1, "seed": [1.4123, 2.8831, 1.3139], "w": 0.2467}, {"name": "The Kink Camp Counselor", "desc": "High on sex, high on emotion, and evangelical that a more open and skilled erotic culture would genuinely heal people. You hold the container, run the workshop, and believe monogamy-as-default is a kind of unexamined harm. There is a curriculum, and you wrote part of it.", "saint": "Carol Queen. Sex educator and writer who has spent a career arguing that erotic skill, honesty, and openness are a path to wholeness. Runs the metaphorical (and sometimes literal) workshop and means every word of it.", "S": 4, "Y": 3, "Z": 3, "seed": [3.2154, 3.1157, 3.1789], "w": -1.018}]};
const Q = DATA.questions, A = DATA.archetypes, ICOV = DATA.icov;
const $ = id => document.getElementById(id);
function esc(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
const quiz = $('quiz');
Q.forEach((q,qi)=>{
  const d=document.createElement('div');d.className='q';
  let h='<h3><span class="n">'+(qi+1)+'</span>'+esc(q.title)+'</h3>';
  q.opts.forEach((o,oi)=>{h+='<label><input type="radio" name="q'+qi+'" value="'+oi+'">'+esc(o.t)+'</label>';});
  d.innerHTML=h;quiz.appendChild(d);
});
const answers={};
quiz.addEventListener('change',e=>{
  const qi=+e.target.name.slice(1);answers[qi]=+e.target.value;
  e.target.closest('.q').querySelectorAll('label').forEach(l=>l.classList.remove('sel'));
  e.target.closest('label').classList.add('sel');
  const n=Object.keys(answers).length;
  $('ct').textContent=n+' / '+Q.length;$('bar').style.width=(100*n/Q.length)+'%';
  $('go').disabled = n<Q.length;
});
let USER=null;
function axisBar(name,lo,hi,v){
  return '<div class="ax"><div class="axhead"><span>'+name+'</span><span class="axval">'+v.toFixed(2)+' / 4</span></div>'+
    '<div class="axbar"><span class="mk" style="left:'+(v/4*100)+'%"></span></div>'+
    '<div class="axends"><span>'+lo+'</span><span>'+hi+'</span></div></div>';
}
function mdist(s,seed){const e=[s[0]-seed[0],s[1]-seed[1],s[2]-seed[2]];let v=0;
  for(let i=0;i<3;i++)for(let j=0;j<3;j++)v+=e[i]*ICOV[i][j]*e[j];return v;}
function rank(s){
  const d=A.map((a,i)=>({i,d:mdist(s,a.seed)-a.w}));
  d.sort((x,y)=>x.d-y.d);return d.map(x=>x.i);
}
$('go').addEventListener('click',()=>{
  let num=[0,0,0],den=[0,0,0];
  Q.forEach((q,qi)=>{const o=q.opts[answers[qi]];
    num[0]+=o.wS*o.S;den[0]+=o.wS;num[1]+=o.wY*o.Y;den[1]+=o.wY;num[2]+=o.wZ*o.Z;den[2]+=o.wZ;});
  const s=den.map((d,i)=>d>0?num[i]/d:2);
  const order=rank(s), best=order[0]; USER={s,best};
  const a=A[best], near=order.slice(1,5).map(i=>'<b>'+esc(A[i].name)+'</b>').join(' &middot; ');
  $('result').innerHTML=
    '<div class="coords">S '+s[0].toFixed(2)+' &nbsp; Y '+s[1].toFixed(2)+' &nbsp; Z '+s[2].toFixed(2)+'</div>'+
    '<h2>'+esc(a.name)+'</h2>'+
    '<div class="bars">'+
      axisBar('Society','Bad for society','Monogamy is property',s[0])+
      axisBar('Sex','One person','Falls for anyone',s[1])+
      axisBar('Emotion','One person','Falls for everyone',s[2])+'</div>'+
    '<div>'+esc(a.desc)+'</div><div class="saint">'+esc(a.saint)+'</div>'+
    '<div class="near">Also close to you: '+near+'</div>'+
    '<button class="allbtn" id="seeall">See where you land among all 45 &rarr;</button>';
  $('result').style.display='block';$('result').scrollIntoView({behavior:'smooth'});
  $('seeall').addEventListener('click',openAll);
});
// ---- 2-D projections + all-results list ----
function projection(ax,ay,labx,laby){
  const W=200,H=200,p=20,sx=v=>p+(v/4)*(W-2*p),sy=v=>H-p-(v/4)*(H-2*p);
  let g='<svg width="'+W+'" height="'+H+'"><rect x="'+p+'" y="'+p+'" width="'+(W-2*p)+'" height="'+(H-2*p)+'" fill="none" stroke="#322c26"/>';
  A.forEach(a=>{g+='<circle cx="'+sx(a.seed[ax])+'" cy="'+sy(a.seed[ay])+'" r="3" fill="#6b6258"><title>'+esc(a.name)+'</title></circle>';});
  if(USER){const a=A[USER.best];
    g+='<circle cx="'+sx(a.seed[ax])+'" cy="'+sy(a.seed[ay])+'" r="6" fill="none" stroke="#c9a24b" stroke-width="2"/>';
    g+='<circle cx="'+sx(USER.s[ax])+'" cy="'+sy(USER.s[ay])+'" r="5" fill="#c9a24b"/>';}
  g+='<text x="'+(W/2)+'" y="'+(H-5)+'" fill="#9b9088" font-size="10" text-anchor="middle">'+labx+' &rarr;</text>';
  g+='<text x="12" y="'+(H/2)+'" fill="#9b9088" font-size="10" transform="rotate(-90 12,'+(H/2)+')">'+laby+' &rarr;</text>';
  return '<div class="projbox">'+g+'</svg></div>';
}
function openAll(){
  $('projwrap').innerHTML='<p style="color:#9b9088">'+(USER?'Your point (filled gold), your result (gold ring), every archetype (grey) &mdash; three 2-D slices of the cube:':'Every archetype across three 2-D slices of the cube. Take the quiz to see where you land.')+'</p><div id="projs">'+
    projection(0,1,'Society','Sex')+projection(0,2,'Society','Emotion')+projection(1,2,'Sex','Emotion')+'</div>';
  $('alllist').innerHTML=A.map(a=>'<div class="arow"><b>'+esc(a.name)+'</b><span class="ac">S'+a.S+' Y'+a.Y+' Z'+a.Z+'</span><div>'+esc(a.desc)+'</div><div class="asaint">'+esc(a.saint)+'</div></div>').join('');
  $('allview').style.display='block';window.scrollTo(0,0);
}
$('browse').addEventListener('click',openAll);
$('closeall').addEventListener('click',()=>{$('allview').style.display='none';});
